<html>
  <head>
    <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  </head>
  <body style="margin: 0; overflow: hidden;">

    <a-scene embedded arjs="debugUIEnabled: false;">


      <a-marker type="pattern" url="acc.patt">
<a-entity scale="0.5 0.5 0.5">
      <a-torus-knot
      
      position="0 1 0"       
      radius="0.4"       
      radius-tubular="0.07" 
      color="#d6e079" 
      animation="property: components.material.material.color; dir: alternate; type: color; from: #d6e079; to: #79e0c5; loop: true; dur: 5000">
    </a-torus-knot>
      <a-cylinder   
      position="0 0 0"       
      radius="0.2"       
      height="1.5"          
      color="#87c788">
    </a-cylinder>
</a-entity>
      </a-marker>
    <a-marker preset="hiro">
      <a-torus-knot 
      position="0 1 0"   
      radius="0.6"       
      radius-tubular="0.1" 
      color="#d6e079"
      animation="property:rotation; to: 0 0 360; dir: alternate; loop:true; dur:5000">
    </a-torus-knot>
      <a-cylinder   
      position="0 0.75 0"   
      radius="0.1"       
      height="1.5"          
      color="#0b5e0d">
    </a-cylinder>
    </a-marker>
    <a-marker preset="kanji">
    <a-gltf-model 
    src="../images/owl.glb" 
    position="0 0 0"
    rotation="0 180 0"
    scale="0.5 0.5 0.5"
     >
  </a-gltf-model>
    <a-light 
    type="point" 
    intensity="50" 
    position="0 3 0">
  </a-light>
   </a-marker>

      <a-entity camera></a-entity>
    </a-scene>
  </body>
</html>
