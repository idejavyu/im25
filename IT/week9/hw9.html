<html>
<head>
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
</head>
<body>
  <a-scene mindar-image="imageTargetSrc: ./targets.mind;" vr-mode-ui="enabled: false">
    <a-assets>
      <video id="vid" src="./1.mp4" loop="true" crossorigin="anonymous" playsinline></video>
      <a-asset-item id="model" src="../images/owl.glb"></a-asset-item>
    </a-assets>

    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <a-entity mindar-image-target="targetIndex: 0">
      <a-video src="#vid" width="1" height="0.56" rotation="0 0 0" play-on-click></a-video>
    </a-entity>

    <a-entity mindar-image-target="targetIndex: 1">
      <a-gltf-model src="#model" scale="0.3 0.3 0.3" position="0 0 0" rotation="0 180 0"></a-gltf-model>
    </a-entity>
  </a-scene>

  <script>

    const scene = document.querySelector('a-scene');
    scene.addEventListener("loaded", () => {
      const vid = document.querySelector("#vid");
      const marker1 = document.querySelector('[mindar-image-target="targetIndex: 0"]');
      marker1.addEventListener("targetFound", () => vid.play());
      marker1.addEventListener("targetLost", () => vid.pause());
    });
  </script>
</body>
</html>
