<html>
  <meta charset="utf-8">
  <head>
    <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
  </head>
  <body>
    <a-scene stats>

      <a-assets>
        <img 
        id="grass" 
        src="https://raw.githubusercontent.com/aframevr/sample-assets/refs/heads/master/assets/images/minecraft/grass.png"
        crossorigin="anonymous">
      </img>

        <video 
        id="city" 
        src="https://cdn.aframe.io/360-video-boilerplate/video/city.mp4" 
        crossorigin="anonymous"
        autoplay 
        loop="true">
      </video>

        <img
        id="sky"
        src="https://raw.githubusercontent.com/aframevr/assets/refs/heads/master/test-models/models/glTF-2.0/virtualcity/s_06.jpg"
        crossorigin="anonymous">
      </img>
      <!-- При завантаженні моделі виникало зависання сцени -->
      </a-assets>

      <a-torus-knot 
      position="1 1.75 -3"       
      radius="0.4"       
      radius-tubular="0.07" 
      color="#d6e079" 
      animation="property: components.material.material.color; dir: alternate; type: color; from: #d6e079; to: #79e0c5; loop: true; dur: 5000">
    </a-torus-knot>
      <a-cylinder   
      position="1 0.75 -3"       
      radius="0.2"       
      height="1.5"          
      color="#87c788">
    </a-cylinder>

      <a-torus-knot 
      position="-1 1.75 -3.25"   
      radius="0.6"       
      radius-tubular="0.1" 
      color="#d6e079"
      animation="property:rotation; to: 0 0 360; dir: alternate; loop:true; dur:5000">
    </a-torus-knot>
      <a-cylinder   
      position="-1 0.75 -3.25"   
      radius="0.1"       
      height="1.5"          
      color="#0b5e0d">
    </a-cylinder>

      <a-box        
      position="0 0.75 -2"  
      height="0.8" 
      width="0.2" 
      depth="0.2" 
      color="#5955c9">
    </a-box>
      <a-octahedron 
      src="#city"
      position="0 1.4 -2" 
      scale="0.5 0.5 0.5" 
      color="#78255f"
      animation="property: scale; to: 1.2 1 1; dir: alternate; dur: 2000; loop: true">
    </a-octahedron>

    <a-gltf-model 
    src="..\images\owl.glb" 
    position="3 0 -4"
    rotation="0 180 0"
    scale="0.5 0.5 0.5"
     >
  </a-gltf-model>
    <a-light 
    type="point" 
    intensity="50" 
    position="4 5 0">
  </a-light>
      <a-plane 
      src="#grass"
      position="0 0 -4"    
      rotation="-90 0 0" 
      height="6" 
      width="6"
      material="repeat: 24 24">
    </a-plane>
      
      <a-sky 
      src="#sky">
    </a-sky>

      <a-plane 
      width="4.3" 
      height="0.5" 
      position="0.07 2.6 -1.8">
    </a-plane>

      <!-- Мій шрифт чомусь не відображав символи :() -->
      <a-text 
      value="Бойченко Максим вітає Вас у VR!" 
      color="#33C3F0" 
      width="6" 
      position="-2 2.6 -1.8" 
      font="..\fonts\arial-msdf.json" 
      negate="false"> 
    </a-text>

    </a-scene>
  </body>
</html>
