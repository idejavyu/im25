<html>
  <head>
    <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>
  </head>
  <body>
    <a-scene>
      <a-torus-knot position="1 1.75 -3"       radius="0.4"       radius-tubular="0.07" color="#d6e079" ></a-torus-knot>
      <a-cylinder   position="1 0.75 -3"       radius="0.2"       height="1.5"          color="#87c788"></a-cylinder>

      <a-torus-knot position="-1 1.75 -3.25"   radius="0.6"       radius-tubular="0.1" color="#d6e079" ></a-torus-knot>
      <a-cylinder   position="-1 0.75 -3.25"   radius="0.1"       height="1.5"          color="#0b5e0d"></a-cylinder>

      <a-box        position="0 0.75 -2"  height="0.8" width="0.2" depth="0.2" color="#5955c9"></a-box>
      <a-octahedron position="0 1.4 -2" scale="0.5 0.5 0.5" color="#78255f"></a-octahedron>

      <a-plane      position="0 0 -4"    rotation="-90 0 0" height="6" width="6"  color="#61334d"></a-plane>
      <a-sky color="#d3e4e6"></a-sky>

      <a-plane width="3.8" height="0.5" position="-0.2 2.6 -1.8"></a-plane>
      <a-text value="Welcome to browser’s VR!" color="black" width="7" position="-2 2.6 -1.8"></a-text>
    </a-scene>
  </body>
</html>
